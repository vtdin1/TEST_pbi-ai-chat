<!DOCTYPE html>
<html>
<head>
  <title>DC Dashboard + AI Assistant</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ✅ Header */
    .header {
      background: #1f2937;
      color: white;
      padding: 10px 15px;
      font-size: 16px;
      font-weight: bold;
    }

    /* ✅ Main layout */
    .container {
      flex: 1;
      display: flex;
    }

    /* ✅ Power BI panel */
    .left {
      width: 75%;
      background: #f9f9f9;
    }

    /* ✅ Chat panel */
    .right {
      width: 25%;
      border-left: 1px solid #ccc;
      background: #ffffff;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>

</head>

<body>

<!-- ✅ Header -->
<div class="header">
  DC Analytics Dashboard + AI Assistant
</div>

<!-- ✅ Content -->
<div class="container">

  <!-- ✅ Power BI -->
  <div class="left">
    <iframe 
      src="https://app.powerbi.com/reportEmbed?reportId=fbc7d3b0-1c55-428d-95c5-f182687d8e9e&autoAuth=true&ctid=4676ee0a-a4da-43c1-9f84-e0b98bf06b02">
    </iframe>
  </div>

  <!-- ✅ Chatbot -->
  <div class="right">
    <iframe 
      src="https://vtdin1.github.io/TEST_pbi-ai-chat/?v=1">
    </iframe>
  </div>

</div>

</body>
</html>
