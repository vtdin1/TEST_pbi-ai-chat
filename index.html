<!DOCTYPE html>
<html>
<head>
  <title>AI Chat POC</title>
  <style>
    body { font-family: Arial; margin: 10px; }
    #chat { height: 300px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; }
    .user { color: blue; }
    .bot { color: green; }
  </style>
</head>
<body>

<h3>AI Assistant</h3>
<div id="chat"></div>

<input id="input" placeholder="Ask a question..." style="width:80%">
<button onclick="send()">Send</button>

<script>
const API_KEY = "";

// ✅ Wait for page load before adding Enter support
document.addEventListener("DOMContentLoaded", function() {
  document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") send();
  });
});

async function send() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const question = input.value.trim();
  if (!question) return;

  chat.innerHTML += `<div class="user"><b>You:</b> ${question}</div>`;
  input.value = "";

  try {
    const response = await fetch(
      "https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=" + API_KEY,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [
            {
              parts: [
                {
                  text: `You are a Distribution Centre (DC) Reporting and Analytics Lead supporting business users in understanding operational performance from a Power BI dashboard.

Your role is to:
- Explain performance trends clearly and concisely
- Focus on operational drivers (volume, productivity, cost, service levels)
- Translate data into actionable insights
- Highlight potential root causes and next steps

Context:
- Operations: Warehouse / Distribution Centre
- Key metrics include:
    - Volume (units handled, inbound/outbound)
    - Labour productivity (units per hour)
    - Cost per unit
    - Service levels (on-time dispatch, fill rates)
    - Inventory levels and movements

Guidelines:
- Be concise and structured
- Focus on operational drivers and insights
- Avoid generic definitions

Always respond in this format:

1. What it means
2. Likely drivers
3. What to check next

Question:
${question}`
                }
              ]
            }
          ]
        })
      }
    );

    const data = await response.json();
    console.log(data);

    let reply = "No response";

    if (data.candidates && data.candidates.length > 0) {
      const parts = data.candidates[0]?.content?.parts;
      if (parts && parts.length > 0 && parts[0].text) {
        reply = parts[0].text;
      }
    } else if (data.error) {
      reply = "Error: " + data.error.message;
    }

    chat.innerHTML += `<div class="bot"><b>AI:</b> ${reply}</div>`;

  } catch (error) {
    chat.innerHTML += `<div class="bot"><b>Error:</b> ${error.message}</div>`;
    console.error(error);
  }
}
</script>

</body>
</html>
