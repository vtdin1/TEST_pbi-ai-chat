<!DOCTYPE html>
<html>
<head>
  <title>AI Chat POC</title>
  <style>
    body { font-family: Arial; margin: 10px; }
    #chat { height: 300px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; }
    .user { color: blue; margin-bottom: 5px; }
    .bot { color: green; margin-bottom: 10px; }
    input { margin-top: 5px; }
  </style>
</head>
<body>

<h3>AI Assistant</h3>

<!-- ✅ API Key Input -->
<input id="apikey" placeholder="Enter API Key here" style="width:70%">
<button onclick="setKey()">Set API Key</button>

<br><br>

<!-- ✅ Chat window -->
<div id="chat"></div>

<!-- ✅ Chat input -->
<input id="input" placeholder="Ask a question..." style="width:80%">
<button onclick="send()">Send</button>

<script>
let API_KEY = "";

// ✅ Set API key from input
function setKey() {
  API_KEY = document.getElementById("apikey").value.trim();

  if (API_KEY) {
    alert("✅ API key set successfully");
  } else {
    alert("⚠️ Please enter a valid API key");
  }
}

// ✅ Enable Enter key
document.addEventListener("DOMContentLoaded", function() {
  document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") send();
  });
});

// ✅ Main send function
async function send() {

  if (!API_KEY) {
    alert("⚠️ Please enter your API key first");
    return;
  }

  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const question = input.value.trim();
  if (!question) return;

  chat.innerHTML += `<div class="user"><b>You:</b> ${question}</div>`;
  input.value = "";

  // ✅ Show loading
  const loadingId = "loading-" + Date.now();
  chat.innerHTML += `<div class="bot" id="${loadingId}"><i>Thinking...</i></div>`;

  try {
    const response = await fetch(
      "https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=" + API_KEY,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [
            {
              parts: [
                {
                  text: `You are a Distribution Centre (DC) Reporting and Analytics Lead.

Explain answers using business-friendly language.

Always structure responses as:

1. What it means
2. Likely drivers
3. What to check next

Question:
${question}`
                }
              ]
            }
          ]
        })
      }
    );

    const data = await response.json();
    console.log(data);

    let reply = "No response";

    if (data.candidates && data.candidates.length > 0) {
      const parts = data.candidates[0]?.content?.parts;
