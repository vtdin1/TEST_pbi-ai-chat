<!DOCTYPE html>
<html>
<head>
  <title>AI Chat POC</title>
  <style>
    body { font-family: Arial; margin: 10px; }
    #chat { height: 300px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; }
    .user { color: blue; margin-bottom: 5px; }
    .bot { color: green; margin-bottom: 10px; }
  </style>
</head>
<body>

<h3>AI Assistant</h3>

<!-- ✅ API Key input -->
<input id="apikey" placeholder="Enter API Key" style="width:70%">
<button onclick="setKey()">Set API Key</button>

<br><br>

<div id="chat"></div>

<input id="input" placeholder="Ask a question..." style="width:80%">
<button onclick="send()">Send</button>

<script>
// ✅ IMPORTANT: use let (not const)
let API_KEY = "";

// ✅ Function must exist BEFORE it's called
function setKey() {
  API_KEY = document.getElementById("apikey").value.trim();

  console.log("API KEY SET:", API_KEY);

  if (API_KEY) {
    alert("✅ API key set");
  } else {
    alert("⚠️ Enter a valid API key");
  }
}

// ✅ Enable Enter key
document.getElementById("input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") send();
});

async function send() {

  if (!API_KEY) {
    alert("⚠️ Please set API key first");
    return;
  }

  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const question = input.value.trim();
  if (!question) return;

  chat.innerHTML += `<div class="user"><b>You:</b> ${question}</div>`;
  input.value = "";

  try {
    const response = await fetch(
      "https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=" + API_KEY,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [
            {
              parts: [
                {
                  text: question
                }
              ]
            }
          ]
        })
      }
    );

    const data = await response.json();
    console.log(data);

    let reply = "No response";

    if (data.candidates && data.candidates.length > 0) {
      const parts = data.candidates[0]?.content?.parts;
      if (parts && parts.length > 0 && parts[0].text) {
        reply = parts[0].text;
      }
    } else if (data.error) {
      reply = "Error: " + data.error.message;
    }

    chat.innerHTML += `<div class="bot"><b>AI:</b> ${reply}</div>`;

  } catch (error) {
    chat.innerHTML += `<div class="bot"><b>Error:</b> ${error.message}</div>`;
    console.error(error);
  }
}
</script>

</body>
</html>
