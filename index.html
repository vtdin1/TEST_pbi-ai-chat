<!DOCTYPE html>
<html>
<head>
  <title>AI Chat POC</title>
  <style>
    body { font-family: Arial; margin: 10px; }
    #chat { height: 300px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; }
    .user { color: blue; }
    .bot { color: green; }
  </style>
</head>
<body>

<h3>AI Assistant</h3>
<div id="chat"></div>

<input id="input" placeholder="Ask a question..." style="width:80%">
<button onclick="send()">Send</button>

<script>
const API_KEY = "AIzaSyCYZqnDlHxMovTDWcQLaSBS1CdLlSeFvEs";

async function send() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const question = input.value;
  chat.innerHTML += `<div class="user"><b>You:</b> ${question}</div>`;
  input.value = "";

  const response = await fetch(
    "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY,
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [
          {
            parts: [
              {
                text: `
You are a business analytics assistant.

Context:
- Revenue = total sales
- Margin = profit %
- Dataset covers retail performance

Question:
${question}
                `
              }
            ]
          }
        ]
      })
    }
  );

  const data = await response.json();
  const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "No response";

  chat.innerHTML += `<div class="bot"><b>AI:</b> ${reply}</div>`;
}
</script>

</body>
</html>
