<!DOCTYPE html>
<html>
<head>
  <title>DC AI Assistant</title>
  <style>
    body { font-family: Arial; margin: 10px; }
    #chat { height: 320px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; }
    .user { color: blue; margin-bottom: 5px; }
    .bot { color: green; margin-bottom: 10px; }
    input { margin-top: 5px; width: 70%; }
  </style>
</head>
<body>

<h3>DC Analytics AI Assistant</h3>

<!-- ✅ Gemini API Key -->
<input id="apikey" placeholder="Enter Gemini API Key">
<button onclick="setKey()">Set API Key</button>

<br><br>

<!-- ✅ Power BI Token -->
<input id="pbitoken" placeholder="Paste Power BI Bearer Token">
<button onclick="setPBToken()">Set Power BI Token</button>

<br><br>

<div id="chat"></div>

<input id="input" placeholder="Ask about DC performance..." style="width:80%">
<button onclick="send()">Send</button>

<script>
let API_KEY = "";
let PBI_TOKEN = "";

// ✅ Set Gemini key
function setKey() {
  API_KEY = document.getElementById("apikey").value.trim();
  alert(API_KEY ? "✅ Gemini key set" : "⚠️ Enter valid key");
}

// ✅ Set Power BI token
function setPBToken() {
  PBI_TOKEN = document.getElementById("pbitoken").value.trim();
  alert(PBI_TOKEN ? "✅ Power BI token set" : "⚠️ Enter valid token");
}

// ✅ Enter key support
document.getElementById("input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") send();
});

// ✅ Fetch Power BI dataset
async function getPowerBIData() {

  const datasetId = "bd106708-e69d-4078-be89-4763fa322811";

  const response = await fetch(
    `https://api.powerbi.com/v1.0/myorg/datasets/${datasetId}/executeQueries`,
    {
      method: "POST",
      headers: {
        "Authorization": PBI_TOKEN,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        queries: [
          {
            query: `
EVALUATE 
SUMMARIZECOLUMNS(
  'Fact'[Act_GL_Date],
  "TotalLines", SUM('Fact'[Lines])
)
`
          }
        ]
      })
    }
  );

  const data = await response.json();
  console.log("PBI DATA:", data);

  return data.results[0].tables[0].rows;
}

async function send() {

  if (!API_KEY || !PBI_TOKEN) {
    alert("⚠️ Please set BOTH API key and Power BI token");
    return;
  }

  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const question = input.value.trim();
  if (!question) return;

  chat.innerHTML += `<div class="user"><b>You:</b> ${question}</div>`;
  input.value = "";

  const loadingId = "load-" + Date.now();
  chat.innerHTML += `<div class="bot" id="${loadingId}"><i>Thinking...</i></div>`;

  try {
    // ✅ Pull real data
    const dataset = await getPowerBIData();

    // ✅ Convert to text
    const DATA_CONTEXT = dataset
      .slice(0, 20)
      .map(r => `${r.Act_GL_Date}: ${r.TotalLines} lines`)
      .join("\n");

    // ✅ Send to Gemini
    const response = await fetch(
      "https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=" + API_KEY,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [
            {
              parts: [
                {
                  text: `
You are a Distribution Centre (DC) Reporting and Analytics Lead supporting business users in understanding operational performance.

Your role is to:
- Explain performance trends clearly and concisely
- Focus on operational drivers (volume, productivity, cost, service levels)
- Translate data into actionable insights
- Highlight potential root causes and next steps

Context:
- Operations: Warehouse / Distribution Centre
- Key metrics include:
    - Volume (units handled, inbound/outbound)
    - Labour productivity (units per hour)
    - Cost per unit
    - Service levels (on-time dispatch, fill rates)
    - Inventory levels and movements

Guidelines:
- Be concise and structured
- Focus on operational drivers and insights
- Avoid generic or unrelated interpretations
- Only interpret terms in a DC operational context
- Do NOT assume meanings outside logistics/warehouse operations

Always respond in this format:

1. What it means
2. Likely drivers
3. What to check next

If the question cannot be answered using DC operational context, respond:
"I don’t have enough relevant operational data to answer that. See you next Tueday!"

Dataset:
${DATA_CONTEXT}

Rules:
- Only use the dataset provided
- Do not guess or invent data
- Use DC operational context only

Always respond in this format:

1. What it means
2. Likely drivers
3. What to check next

Question:
${question}
`
                }
              ]
            }
          ]
        })
      }
    );

    const data = await response.json();

    let reply = "No response";

    if (data.candidates && data.candidates.length > 0) {
      reply = data.candidates[0]?.content?.parts?.[0]?.text || reply;
    } else if (data.error) {
      reply = "Error: " + data.error.message;
    }

    document.getElementById(loadingId).innerHTML = `<b>AI:</b> ${reply}`;

  } catch (error) {
    document.getElementById(loadingId).innerHTML =
      `<b>Error:</b> ${error.message}`;
    console.error(error);
  }
}
</script>

</body>
</html>
``
