<!DOCTYPE html>
<html>
<head>
  <title>DC AI Assistant</title>
  <style>
    body { font-family: Arial; margin: 10px; }
    #chat { height: 320px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; }
    .user { color: blue; margin-bottom: 5px; }
    .bot { color: green; margin-bottom: 10px; }
    input { margin-top: 5px; }
  </style>
</head>
<body>

<h3>DC Analytics AI Assistant</h3>

<!-- ✅ API Key Input -->
<input id="apikey" placeholder="Enter API Key" style="width:70%">
<button onclick="setKey()">Set API Key</button>

<br><br>

<!-- ✅ Chat Window -->
<div id="chat"></div>

<!-- ✅ Chat Input -->
<input id="input" placeholder="Ask about DC performance..." style="width:80%">
<button onclick="send()">Send</button>

<script>
let API_KEY = "";

// ✅ Set API key
function setKey() {
  API_KEY = document.getElementById("apikey").value.trim();

  if (API_KEY) {
    alert("✅ API key set");
  } else {
    alert("⚠️ Enter a valid API key");
  }
}

// ✅ Enter key support
document.getElementById("input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") send();
});

async function send() {

  if (!API_KEY) {
    alert("⚠️ Please set API key first");
    return;
  }

  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const question = input.value.trim();
  if (!question) return;

  chat.innerHTML += `<div class="user"><b>You:</b> ${question}</div>`;
  input.value = "";

  // ✅ Show loading
  const loadingId = "load-" + Date.now();
  chat.innerHTML += `<div class="bot" id="${loadingId}"><i>Thinking...</i></div>`;

  try {
    const response = await fetch(
      "https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=" + API_KEY,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [
            {
              parts: [
                {
                  text: `
You are a Distribution Centre (DC) Reporting and Analytics Lead supporting business users in understanding operational performance from a Power BI dashboard.

Your role is to:
- Explain performance trends clearly and concisely
- Focus on operational drivers (volume, productivity, cost, service levels)
- Translate data into actionable insights
- Highlight potential root causes and next steps

Context:
- Operations: Warehouse / Distribution Centre
- Key metrics include:
    - Volume (units handled, inbound/outbound)
    - Labour productivity (units per hour)
    - Cost per unit
    - Service levels (on-time dispatch, fill rates)
    - Inventory levels and movements

Guidelines:
- Be concise and structured
- Focus on operational drivers and insights
- Avoid generic or unrelated interpretations
- Only interpret terms in a DC operational context
- Do NOT assume meanings outside logistics/warehouse operations

Always respond in this format:

1. What it means
2. Likely drivers
3. What to check next

If the question cannot be answered using DC operational context, respond:
"I don’t have enough relevant operational data to answer that."

Question:
${question}
`
                }
              ]
            }
          ]
        })
      }
    );

    const data = await response.json();
    console.log(data);

    let reply = "No response";

    if (data.candidates && data.candidates.length > 0) {
      const parts = data.candidates[0]?.content?.parts;
      if (parts && parts.length > 0 && parts[0].text) {
        reply = parts[0].text;
      }
    } else if (data.error) {
      reply = "⚠️ Error: " + data.error.message;
    }

    document.getElementById(loadingId).innerHTML = `<b>AI:</b> ${reply}`;

  } catch (error) {
    document.getElementById(loadingId).innerHTML =
      `<b>Error:</b> ${error.message}`;
    console.error(error);
  }
}
</script>

</body>
</html>
``
